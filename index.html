<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memorama Senshi-Kan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
 
  .game-container { width: 100%; max-width: 560px; }
 
  /* ── Info alumno ── */
  .alumno-card {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 14px;
    padding: 0.75rem 1.25rem;
    margin-bottom: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .alumno-name { font-size: 15px; font-weight: 600; color: #e8d5a3; }
  .alumno-meta { font-size: 12px; color: #8899bb; }
  .intentos-badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    background: #0f3460;
    color: #8899bb;
  }
  .intentos-badge.agotado { background: #3a1a1a; color: #e05c3a; }
 
  /* ── Loading ── */
  .loading-msg {
    text-align: center;
    padding: 2rem;
    color: #8899bb;
    font-size: 14px;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid #0f3460;
    border-top-color: #d4a017;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
 
  /* ── Bloque límite alcanzado ── */
  .limite-block {
    display: none;
    background: #16213e;
    border: 1px solid #3a1a1a;
    border-radius: 14px;
    padding: 2rem;
    text-align: center;
    margin-bottom: 1rem;
  }
  .limite-block.show { display: block; }
  .limite-icon { font-size: 40px; margin-bottom: 0.75rem; }
  .limite-title { font-size: 18px; font-weight: 600; color: #e05c3a; margin-bottom: 0.5rem; }
  .limite-sub { font-size: 13px; color: #8899bb; margin-bottom: 1.5rem; }
 
  /* ── Header HUD ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 14px;
    padding: 0.75rem 1.25rem;
    margin-bottom: 1.25rem;
  }
  .stat { text-align: center; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #8899bb; margin-bottom: 2px; }
  .stat-value { font-size: 24px; font-weight: 600; color: #e8d5a3; }
  .stat-value.warn { color: #e05c3a; }
 
  /* ── Tablero ── */
  .board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .board.locked { pointer-events: none; }
 
  /* ── Cartas ── */
  .card-slot { aspect-ratio: 2/3; perspective: 700px; cursor: pointer; }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.42s cubic-bezier(.4,0,.2,1);
    border-radius: 10px;
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-inner.matched {
    transform: rotateY(180deg);
    opacity: 0;
    transition: transform 0.42s, opacity 0.35s 0.3s;
    pointer-events: none;
  }
  .card-face {
    position: absolute; inset: 0;
    border-radius: 10px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .card-back {
    background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
    border: 2px solid #1a4a7a;
  }
  .card-back-inner {
    width: 52%; height: 60%;
    border: 1.5px solid rgba(255,255,255,0.18);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; opacity: 0.55;
  }
  .card-front {
    background: linear-gradient(160deg, #d4a017 0%, #b8860b 100%);
    border: 2px solid #c9920a;
    transform: rotateY(180deg);
  }
  .card-front:hover { filter: brightness(1.08); }
  .card-emoji {
    font-size: clamp(26px, 5vw, 38px);
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }
 
  /* ── Footer botones ── */
  .footer { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
 
  .btn {
    padding: 9px 24px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.2s, color 0.2s, opacity 0.2s;
  }
  .btn-iniciar {
    border: none;
    background: #d4a017;
    color: #1a1a2e;
    font-weight: 600;
  }
  .btn-iniciar:hover:not(:disabled) { background: #e8b820; }
  .btn-iniciar:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-portal {
    border: 1.5px solid #d4a017;
    background: transparent;
    color: #e8d5a3;
    display: none;
  }
  .btn-portal.show { display: inline-block; }
  .btn-portal:hover { background: #d4a017; color: #1a1a2e; }
 
  /* ── Overlay resultado ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    align-items: center; justify-content: center;
    z-index: 999;
  }
  .overlay.show { display: flex; }
  .result-card {
    background: #16213e;
    border: 1px solid #d4a017;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    text-align: center;
    max-width: 320px; width: 90%;
    animation: popIn 0.3s cubic-bezier(.4,0,.2,1);
  }
  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
  .result-stars  { font-size: 32px; letter-spacing: 6px; margin-bottom: 0.75rem; }
  .result-title  { font-size: 22px; font-weight: 600; color: #e8d5a3; margin-bottom: 0.4rem; }
  .result-sub    { font-size: 13px; color: #8899bb; margin-bottom: 1.5rem; }
  .result-score  { font-size: 52px; font-weight: 700; color: #d4a017; line-height: 1; }
  .result-label  { font-size: 12px; color: #8899bb; margin-bottom: 0.5rem; }
  .result-saving { font-size: 12px; color: #8899bb; margin-bottom: 1.5rem; min-height: 18px; }
  .result-saving.ok  { color: #4caf50; }
  .result-saving.err { color: #e05c3a; }
 
  .btn-volver {
    display: block; width: 100%;
    padding: 10px 0; font-size: 14px;
    font-family: inherit; cursor: pointer;
    border-radius: 8px; border: none;
    background: #d4a017; color: #1a1a2e;
    font-weight: 600; margin-top: 0.75rem;
    transition: background 0.2s;
  }
  .btn-volver:hover { background: #e8b820; }
 
  .sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); border: 0;
  }
</style>
</head>
<body>
 
<div class="game-container">
  <h1 class="sr-only">Memorama de deportes</h1>
 
  <!-- Info alumno -->
  <div class="alumno-card" id="alumno-card" style="display:none">
    <div>
      <div class="alumno-name" id="alumno-name">—</div>
      <div class="alumno-meta" id="alumno-meta">—</div>
    </div>
    <div class="intentos-badge" id="intentos-badge">Verificando...</div>
  </div>
 
  <!-- Loading inicial -->
  <div class="loading-msg" id="loading-msg">
    <span class="spinner"></span> Verificando información del alumno...
  </div>
 
  <!-- Límite alcanzado -->
  <div class="limite-block" id="limite-block">
    <div class="limite-icon">🚫</div>
    <div class="limite-title">Límite de intentos alcanzado</div>
    <div class="limite-sub" id="limite-sub">Has alcanzado el número máximo de intentos permitidos para hoy en este reto.</div>
  </div>
 
  <!-- HUD del juego -->
  <div class="header" id="hud" style="display:none">
    <div class="stat">
      <div class="stat-label">Pares</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Tiempo</div>
      <div class="stat-value" id="timer">1:00</div>
    </div>
    <div class="stat">
      <div class="stat-label">Volteos</div>
      <div class="stat-value" id="tries">0</div>
    </div>
  </div>
 
  <!-- Tablero -->
  <div class="board" id="board"></div>
 
  <!-- Botones footer -->
  <div class="footer">
    <button class="btn btn-iniciar" id="btn-iniciar" disabled onclick="startGame()">▶ Iniciar juego</button>
    <button class="btn btn-portal" id="btn-portal" onclick="volverPortal()">← Volver al portal</button>
  </div>
</div>
 
<!-- Overlay resultado final -->
<div class="overlay" id="overlay">
  <div class="result-card">
    <div class="result-stars" id="result-stars"></div>
    <div class="result-title"  id="result-title"></div>
    <div class="result-sub"    id="result-sub-text"></div>
    <div class="result-score"  id="result-score">0</div>
    <div class="result-label">pares encontrados de 10</div>
    <div class="result-saving" id="result-saving">Guardando resultado...</div>
    <button class="btn-volver" id="btn-volver-overlay" onclick="volverPortal()">← Volver al portal</button>
  </div>
</div>
 
<script>
  /* ══════════════════════════════════════════════
     CONFIGURACIÓN
  ══════════════════════════════════════════════ */
  const API_URL    = 'https://script.google.com/macros/s/AKfycbwX5w8iiwkJVbGtpz-5f20U9jue2MC0vouE3blkHXo9CIMqg9bvCZrAYE8WKxH4gXGGWzg/exec';
  const PORTAL_URL = 'https://americordzn-karate.github.io/retos/';
  const SPORTS     = ['⚽','🏀','🎾','🏈','⚾','🏐','🏉','🎱','🏓','🏸'];
  const TOTAL      = SPORTS.length;
  const SECS       = 60;
 
  /* ══════════════════════════════════════════════
     PARÁMETROS DEL PORTAL
  ══════════════════════════════════════════════ */
  const params  = new URLSearchParams(window.location.search);
  const ALUMNO  = params.get('nombre') || 'Alumno';
  const EDAD    = params.get('edad')   || '';
  const RETO    = params.get('reto')   || 'MEMORAMA';
  const ESTATURA = params.get('estatura') || '';
  const PESO    = params.get('peso')   || '';
 
  /* ══════════════════════════════════════════════
     ESTADO DEL JUEGO
  ══════════════════════════════════════════════ */
  let flipped = [], matched = 0, tries = 0, score = 0;
  let canFlip = true, timerID = null, secondsLeft = SECS;
  let gameStarted = false;
  let maxIntentos = 0, intentosHoy = 0;
 
  /* ══════════════════════════════════════════════
     INICIALIZACIÓN
  ══════════════════════════════════════════════ */
  window.addEventListener('DOMContentLoaded', async () => {
    // Mostrar datos del alumno
    document.getElementById('alumno-name').textContent = ALUMNO;
    document.getElementById('alumno-meta').textContent =
      [EDAD ? 'Edad: ' + EDAD : '', ESTATURA ? 'Est: ' + ESTATURA + ' cm' : '', PESO ? 'Peso: ' + PESO + ' kg' : '']
      .filter(Boolean).join(' · ');
    document.getElementById('alumno-card').style.display = 'flex';
 
    await verificarIntentos();
  });
 
  /* ══════════════════════════════════════════════
     VERIFICAR INTENTOS DESDE APPSCRIPT
  ══════════════════════════════════════════════ */
  async function verificarIntentos() {
    try {
      const url = API_URL + '?action=verificarIntentos&nombre=' +
        encodeURIComponent(ALUMNO) + '&reto=' + encodeURIComponent(RETO);
      const res  = await fetch(url);
      const data = await res.json();
 
      maxIntentos  = data.maxIntentos  || 1;
      intentosHoy  = data.intentosHoy  || 0;
 
      document.getElementById('loading-msg').style.display = 'none';
 
      const badge = document.getElementById('intentos-badge');
 
      if (intentosHoy >= maxIntentos) {
        // Límite alcanzado
        badge.textContent = 'Intentos: ' + intentosHoy + '/' + maxIntentos;
        badge.classList.add('agotado');
        document.getElementById('limite-sub').textContent =
          'Has usado ' + intentosHoy + ' de ' + maxIntentos +
          ' intento(s) permitido(s) hoy para este reto.';
        document.getElementById('limite-block').classList.add('show');
        document.getElementById('btn-portal').classList.add('show');
        document.getElementById('btn-iniciar').disabled = true;
      } else {
        // Puede jugar
        badge.textContent = 'Intentos hoy: ' + intentosHoy + '/' + maxIntentos;
        document.getElementById('hud').style.display  = 'flex';
        document.getElementById('btn-iniciar').disabled = false;
        prepareBoard();
      }
 
    } catch (err) {
      document.getElementById('loading-msg').innerHTML =
        '⚠️ No se pudo verificar los intentos. <br><small style="color:#e05c3a">' + err.message + '</small>';
      // Permitir jugar en caso de error de red (modo offline)
      document.getElementById('hud').style.display = 'flex';
      document.getElementById('btn-iniciar').disabled = false;
      prepareBoard();
    }
  }
 
  /* ══════════════════════════════════════════════
     PREPARAR TABLERO (sin iniciar timer)
  ══════════════════════════════════════════════ */
  function prepareBoard() {
    const deck  = shuffle([...SPORTS, ...SPORTS]);
    const board = document.getElementById('board');
    board.innerHTML = '';
    board.classList.add('locked');   // bloqueado hasta INICIAR
 
    deck.forEach((emoji, idx) => {
      const slot = document.createElement('div');
      slot.className = 'card-slot';
      slot.innerHTML = `
        <div class="card-inner" id="ci-${idx}">
          <div class="card-face card-back">
            <div class="card-back-inner">🥋</div>
          </div>
          <div class="card-face card-front">
            <span class="card-emoji">${emoji}</span>
          </div>
        </div>`;
      slot.addEventListener('click', () => flipCard(idx, emoji));
      board.appendChild(slot);
    });
  }
 
  /* ══════════════════════════════════════════════
     INICIAR JUEGO
  ══════════════════════════════════════════════ */
  function startGame() {
    if (gameStarted) return;
    gameStarted  = true;
    flipped = []; matched = 0; tries = 0; score = 0; canFlip = true;
    secondsLeft  = SECS;
    updateHUD();
    document.getElementById('board').classList.remove('locked');
    document.getElementById('btn-iniciar').disabled = true;
    timerID = setInterval(tick, 1000);
  }
 
  /* ══════════════════════════════════════════════
     MECÁNICA DEL JUEGO
  ══════════════════════════════════════════════ */
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
 
  function tick() {
    secondsLeft--;
    updateHUD();
    if (secondsLeft <= 0) { clearInterval(timerID); endGame(false); }
  }
 
  function updateHUD() {
    document.getElementById('score').textContent = score;
    document.getElementById('tries').textContent = tries;
    const m  = Math.floor(secondsLeft / 60);
    const s  = secondsLeft % 60;
    const el = document.getElementById('timer');
    el.textContent = m + ':' + String(s).padStart(2, '0');
    el.classList.toggle('warn', secondsLeft <= 15);
  }
 
  function flipCard(idx, emoji) {
    if (!canFlip || !gameStarted) return;
    const ci = document.getElementById('ci-' + idx);
    if (ci.classList.contains('flipped') || ci.classList.contains('matched')) return;
 
    ci.classList.add('flipped');
    flipped.push({ idx, emoji, ci });
 
    if (flipped.length < 2) return;
 
    tries++;
    canFlip = false;
    const [a, b] = flipped;
 
    if (a.emoji === b.emoji) {
      score++; matched++;
      updateHUD();
      setTimeout(() => {
        a.ci.classList.replace('flipped', 'matched');
        b.ci.classList.replace('flipped', 'matched');
        flipped = []; canFlip = true;
        if (matched === TOTAL) { clearInterval(timerID); endGame(true); }
      }, 650);
    } else {
      setTimeout(() => {
        a.ci.classList.remove('flipped');
        b.ci.classList.remove('flipped');
        flipped = []; canFlip = true;
      }, 950);
    }
  }
 
  /* ══════════════════════════════════════════════
     FIN DEL JUEGO + GUARDAR EN APPSCRIPT
  ══════════════════════════════════════════════ */
  async function endGame(completed) {
    document.getElementById('board').classList.add('locked');
    gameStarted = false;
 
    // Mostrar overlay
    const pct = score / TOTAL;
    document.getElementById('result-stars').textContent =
      pct === 1 ? '⭐⭐⭐' : pct >= 0.6 ? '⭐⭐' : '⭐';
    document.getElementById('result-title').textContent =
      completed ? '¡Tablero completo!' : 'Tiempo agotado';
    document.getElementById('result-sub-text').textContent =
      completed ? 'Encontraste todos los pares.' : 'Se terminó el minuto.';
    document.getElementById('result-score').textContent  = score;
    document.getElementById('result-saving').textContent = '⏳ Guardando resultado...';
    document.getElementById('result-saving').className   = 'result-saving';
    document.getElementById('btn-volver-overlay').style.display = 'none';
 
    setTimeout(() => document.getElementById('overlay').classList.add('show'), 400);
 
    // Guardar en Google Sheets
    try {
      const payload = {
        action        : 'guardarResultado',
        nombre_alumno : ALUMNO,
        nombre_reto   : RETO,
        puntos        : score,
        edad          : EDAD,
        estatura      : ESTATURA,
        peso          : PESO
      };
 
      const res  = await fetch(API_URL, {
        method : 'POST',
        body   : JSON.stringify(payload)
      });
      const data = await res.json();
 
      if (data.status === 'ok') {
        document.getElementById('result-saving').textContent = '✅ Resultado guardado correctamente';
        document.getElementById('result-saving').className   = 'result-saving ok';
      } else {
        throw new Error(data.message || 'Respuesta inesperada');
      }
    } catch (err) {
      document.getElementById('result-saving').textContent = '⚠️ No se pudo guardar: ' + err.message;
      document.getElementById('result-saving').className   = 'result-saving err';
    }
 
    // Mostrar botón volver al portal
    document.getElementById('btn-volver-overlay').style.display = 'block';
    document.getElementById('btn-portal').classList.add('show');
  }
 
  /* ══════════════════════════════════════════════
     VOLVER AL PORTAL
  ══════════════════════════════════════════════ */
  function volverPortal() {
    window.location.href = PORTAL_URL;
  }
</script>
</body>
</html>
